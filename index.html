<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПДА | Бібліотека карток</title>
    <style>
        :root { --pda-orange: #ffaa00; --pda-bg: #0a0a0a; --pda-card: #151515; }
        body { 
            background-color: var(--pda-bg); color: var(--pda-orange); 
            font-family: 'Courier New', monospace; margin: 0; padding: 10px;
            background-image: repeating-linear-gradient(0deg, rgba(255,170,0,0.03) 0px, rgba(255,170,0,0.03) 1px, transparent 1px, transparent 2px);
        }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 3px; font-size: 20px; border-bottom: 1px solid var(--pda-orange); padding-bottom: 10px; margin-bottom: 15px; }
        
        /* Блок лічильника */
        .counter-box {
            text-align: center;
            font-size: 14px;
            background: rgba(255, 170, 0, 0.05);
            border: 1px dashed var(--pda-orange);
            padding: 8px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #stalker-count {
            font-weight: bold;
            font-size: 16px;
            text-shadow: 0 0 8px var(--pda-orange);
        }

        /* Блок управління: пошук + кнопка */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        #search { 
            width: 100%; padding: 10px; box-sizing: border-box; background: #000; 
            border: 1px solid var(--pda-orange); color: var(--pda-orange); 
            font-family: inherit; outline: none; flex-grow: 1;
        }

        #view-toggle {
            background: #000; border: 1px solid var(--pda-orange); color: var(--pda-orange);
            font-family: inherit; cursor: pointer; padding: 0 15px; font-weight: bold;
            transition: 0.3s; min-width: 120px; text-transform: uppercase;
        }
        #view-toggle:hover { background: rgba(255,170,0,0.2); }
        #view-toggle:active { box-shadow: 0 0 10px var(--pda-orange); }

        /* Стилі для режиму СІТКИ (за замовчуванням) */
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        /* Стилі для режиму СПИСКУ */
        .list { display: flex; flex-direction: column; gap: 10px; }
        
        .list .card {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 15px;
        }
        
        .list .card img {
            width: 100px; /* Маленька картинка для списку */
            height: auto;
            margin-bottom: 0;
            flex-shrink: 0;
        }

        .list .card-title { text-align: left; }
        
        /* Спільні стилі карток */
        .card { 
            background: var(--pda-card); border: 1px solid #332200; border-radius: 8px; 
            padding: 10px; transition: 0.3s;
        }
        .card:active { border-color: var(--pda-orange); box-shadow: 0 0 10px var(--pda-orange); }
        .card img { width: 100%; border-radius: 5px; filter: sepia(0.3) contrast(1.1); margin-bottom: 10px; }
        .card-title { font-weight: bold; margin-bottom: 10px; font-size: 16px; text-align: center; }
        
        /* Контейнер для тексту і аудіо */
        .card-content { flex-grow: 1; min-width: 0; width: 100%; }
        
        .audio-label { font-size: 12px; color: #885f00; margin-bottom: 3px; text-align: left; }
        audio { width: 100%; height: 35px; filter: invert(70%) sepia(100%) saturate(1000%) hue-rotate(10deg); outline: none; }
        
        /* Стилі пагінації (сторінок) */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .page-btn {
            background: #000; border: 1px solid var(--pda-orange); color: var(--pda-orange);
            font-family: inherit; cursor: pointer; padding: 8px 12px; font-weight: bold;
            transition: 0.3s;
        }
        
        .page-btn:hover:not(:disabled) { background: rgba(255,170,0,0.2); }
        .page-btn.active { background: var(--pda-orange); color: #000; }
        .page-btn:disabled { border-color: #443300; color: #443300; cursor: not-allowed; }

    </style>
</head>

        // Логіка РЕАЛЬНОГО лічильника УНІКАЛЬНИХ Сталкерів
        async function initCounter() {
            const countEl = document.getElementById('stalker-count');
            countEl.innerText = "ЗВ'ЯЗОК...";

            // Унікальна назва лічильника
            const pdaNamespace = 'my-unique-stalker-pda-zone-v1'; 
            const hasVisited = localStorage.getItem('pdaVisitedFlag');

            try {
                let apiUrl = `https://api.counterapi.dev/v1/${pdaNamespace}/visits`;
                if (!hasVisited) {
                    apiUrl += '/up';
                }
                
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (!hasVisited && data.count) {
                    localStorage.setItem('pdaVisitedFlag', 'true');
                }
                
                countEl.innerText = data.count.toString().padStart(5, '0');
                
            } catch (error) {
                countEl.innerText = "ПОМИЛКА";
                console.error("Втрачено зв'язок з сервером НДІЧАЗ:", error);
            }
        }

        // Запускаємо лічильник
        initCounter();

        // Налаштування пагінації та відображення
        let isListView = false;
        let currentPage = 1;
        const cardsPerPage = 12;
        let currentFilteredData = cardsData;

        // Перемикач Сітка / Список
        function toggleView() {
            isListView = !isListView;
            const gridEl = document.getElementById('pda-grid');
            const btn = document.getElementById('view-toggle');
            
            if (isListView) {
                gridEl.classList.remove('grid');
                gridEl.classList.add('list');
                btn.innerHTML = "⊞ Сітка";
            } else {
                gridEl.classList.remove('list');
                gridEl.classList.add('grid');
                btn.innerHTML = "≡ Список";
            }
        }

        // Відображення конкретної сторінки
        function displayPage(page) {
            currentPage = page;
            const startIndex = (currentPage - 1) * cardsPerPage;
            const endIndex = startIndex + cardsPerPage;
            const paginatedData = currentFilteredData.slice(startIndex, endIndex);
            
            renderCards(paginatedData);
            renderPaginationControls();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Рендер кнопок пагінації (Зверху і знизу)
        function renderPaginationControls() {
            const totalPages = Math.ceil(currentFilteredData.length / cardsPerPage);
            const containerTop = document.getElementById('pagination-controls-top');
            const containerBottom = document.getElementById('pagination-controls-bottom');
            
            if (totalPages <= 1) {
                containerTop.innerHTML = '';
                containerBottom.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="displayPage(${currentPage - 1})">◄ Попередня</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="displayPage(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="displayPage(${currentPage + 1})">Наступна ►</button>`;
            
            containerTop.innerHTML = html;
            containerBottom.innerHTML = html;
        }

        // Рендер самих карток
        function renderCards(data) {
            const grid = document.getElementById('pda-grid');
            grid.innerHTML = data.map(card => `
                <div class="card">
                    <img src="${card.img}" alt="${card.name}">
                    <div class="card-content">
                        <div class="card-title">#${card.id} - ${card.name}</div>
                        ${card.audio1 ? `
                        <div class="audio-label">${card.audio1Name ? card.audio1Name : 'Аудіо 1:'}</div>
                        <audio controls src="${card.audio1}"></audio>` : ''}
                        ${card.audio2 ? `
                        <div class="audio-label" style="margin-top: 10px;">${card.audio2Name ? card.audio2Name : 'Аудіо 2:'}</div>
                        <audio controls src="${card.audio2}"></audio>` : ''}
                        ${card.audio ? `
                        <div class="audio-label">Аудіо:</div>
                        <audio controls src="${card.audio}"></audio>` : ''}
                    </div>
                </div>
            `).join('');

            // Автоматична зупинка інших аудіо при запуску нового
            const allAudios = document.querySelectorAll('audio');
            allAudios.forEach(audio => {
                audio.addEventListener('play', function() {
                    allAudios.forEach(otherAudio => {
                        if (otherAudio !== this) {
                            otherAudio.pause();
                        }
                    });
                });
            });
        }

        // Пошук
        function searchCard() {
            let input = document.getElementById('search').value.toLowerCase();
            currentFilteredData = cardsData.filter(card => 
                card.name.toLowerCase().includes(input) || 
                card.id.includes(input)
            );
            displayPage(1);
        }

        // Початковий запуск
        displayPage(1);
    </script>
