<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === АРМІЙСЬКА ПАЛІТРА === */
        :root { 
            --tactical-main: #b8c29b; /* Основний текст (світла олива) */
            --tactical-bg: #151713;   /* Дуже темний фон */
            --tactical-card: #151515; /* ОРИГІНАЛЬНИЙ темний фон карток */
            --tactical-border: #424a33; /* Рамки та межі */
            --tactical-highlight: #707a55; /* Активні елементи */
            --tactical-alert: #a63c32; /* Приглушений червоний для лічильника */
        }
        
        body { 
            background-color: var(--tactical-bg); 
            color: var(--tactical-main); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 15px;
            /* Тактична сітка координат */
            background-image: 
                linear-gradient(rgba(184, 194, 155, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(184, 194, 155, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        h1 { 
            text-align: center; text-transform: uppercase; letter-spacing: 4px; 
            font-size: 22px; font-weight: bold; 
            border-bottom: 3px double var(--tactical-border); 
            padding-bottom: 15px; margin-bottom: 20px; 
            text-shadow: 1px 1px 0px #000;
        }

        /* Блок лічильника */
        .counter-box {
            text-align: center; font-size: 14px; font-weight: bold;
            background: #10120f; border: 2px solid var(--tactical-border);
            border-left: 8px solid var(--tactical-alert); 
            padding: 10px; margin-bottom: 20px;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #stalker-count {
            color: var(--tactical-alert); font-size: 18px;
            text-shadow: 0 0 5px rgba(166, 60, 50, 0.5);
        }
        
        /* Блок управління */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        #search { 
            width: 100%; padding: 12px; box-sizing: border-box; 
            background: #0d0f0c; border: 2px solid var(--tactical-border); 
            color: var(--tactical-main); font-family: inherit; font-size: 16px;
            outline: none; flex-grow: 1; border-radius: 2px;
        }
        #search:focus { border-color: var(--tactical-highlight); }
        
        #view-toggle {
            background: #1a1c17; border: 2px solid var(--tactical-border); 
            color: var(--tactical-main); font-family: inherit; font-size: 14px;
            cursor: pointer; padding: 0 20px; font-weight: bold;
            transition: 0.2s; text-transform: uppercase; border-radius: 2px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        #view-toggle:hover { background: var(--tactical-highlight); color: #000; }
        #view-toggle:active { transform: translateY(2px); }

        /* Сітка та Список */
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .list { display: flex; flex-direction: column; gap: 15px; }
        .list .card { display: flex; flex-direction: row; align-items: flex-start; gap: 15px; }
        .list .card img { width: 120px; height: auto; margin-bottom: 0; flex-shrink: 0; }
        .list .card-title { text-align: left; border-bottom: 1px solid var(--tactical-border); padding-bottom: 5px; background: transparent; border-top: none; border-left: none; border-right: none;}
        
        /* Картки (Оригінальна палітра + Тактичні рамки) */
        .card { 
            background: var(--tactical-card); border: 2px solid var(--tactical-border); 
            border-radius: 3px; padding: 15px; transition: 0.2s;
            position: relative; box-shadow: 3px 3px 6px rgba(0,0,0,0.6);
        }
        
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 10px; height: 10px;
            border-top: 2px solid var(--tactical-main); border-left: 2px solid var(--tactical-main);
        }
        .card::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 10px; height: 10px;
            border-bottom: 2px solid var(--tactical-main); border-right: 2px solid var(--tactical-main);
        }

        .card:hover { border-color: var(--tactical-highlight); }
        
        .card img { 
            width: 100%; border-radius: 2px; margin-bottom: 15px; 
            /* ОРИГІНАЛЬНИЙ фільтр зображень замість військового */
            filter: sepia(0.3) contrast(1.1); 
            border: 1px solid #111;
        }
        
        .card-title { 
            font-weight: bold; margin-bottom: 15px; font-size: 16px; text-align: center; 
            background: #0d0f0c; padding: 8px; border: 1px solid var(--tactical-border);
            letter-spacing: 1px; color: #d0d6c0;
        }
        .card-content { flex-grow: 1; min-width: 0; width: 100%; }
        
        .audio-label { font-size: 12px; color: #8e9973; margin-bottom: 5px; text-align: left; font-weight: bold;}
        audio { 
            width: 100%; height: 35px; outline: none; border-radius: 2px;
            filter: invert(80%) sepia(20%) saturate(300%) hue-rotate(50deg) contrast(1.2); 
        }
        
        /* Кнопки та блоки розшифровки */
        .transcript-btn {
            background: #141712; border: 1px solid var(--tactical-border);
            border-left: 4px solid var(--tactical-highlight);
            color: var(--tactical-main); font-family: inherit; font-size: 12px; 
            cursor: pointer; padding: 8px; margin-top: 8px; margin-bottom: 12px; 
            width: 100%; text-align: left; transition: 0.2s; font-weight: bold;
        }
        .transcript-btn:hover { background: var(--tactical-highlight); color: #000; }
        
        .transcript-content {
            display: none; margin-top: 5px; padding: 12px; margin-bottom: 15px;
            background: #0d0f0c; border: 1px solid var(--tactical-border); 
            font-size: 13px; color: #a1ad82; line-height: 1.5; white-space: pre-wrap;
            border-radius: 2px;
        }
        .transcript-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        .loading-text { color: var(--tactical-main); font-style: italic; animation: blink 1s infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Пагінація */
        .pagination { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin: 25px 0; }
        .page-btn {
            background: #141712; border: 2px solid var(--tactical-border); 
            color: var(--tactical-main); font-family: inherit; cursor: pointer; 
            padding: 8px 15px; font-weight: bold; transition: 0.2s; border-radius: 2px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5); 
        }
        .page-btn:hover:not(:disabled) { 
            background: var(--tactical-border); transform: translate(-1px, -1px); 
            box-shadow: 3px 3px 0px rgba(0,0,0,0.5); 
        }
        .page-btn.active { 
            background: var(--tactical-highlight); color: #000; 
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5); transform: translate(1px, 1px);
        }
        .page-btn:disabled { border-color: #2a2e24; color: #3b4231; cursor: not-allowed; box-shadow: none; }

        /* Екран завантаження */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0d0f0c; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: flex-start; padding: 30px; box-sizing: border-box;
            transition: opacity 0.8s ease-out;
            background-image: 
                linear-gradient(rgba(184, 194, 155, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(184, 194, 155, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #boot-screen.hidden { opacity: 0; pointer-events: none; }
        .boot-line { margin-bottom: 8px; font-size: 16px; color: var(--tactical-main); font-weight: bold;}
        .cursor {
            display: inline-block; width: 10px; height: 16px; background-color: var(--tactical-main);
            animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 5px;
        }
    </style>
</head>

        document.addEventListener("DOMContentLoaded", () => {
            const bootScreen = document.getElementById('boot-screen');
            const bootText = document.getElementById('boot-text');
            const messages = [
                "Ініціалізація військового протоколу...", 
                "Синхронізація з серверами 'НДІЧАЗ'...",
                "Дешифрування архівів НДІЧАЗ... [ОК]", 
                "Перевірка цілісності даних...",
                "Завантаження бази даних: 100%", 
                "ДОСТУП ДОЗВОЛЕНО."
            ];
            let delay = 0;
            messages.forEach((msg) => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = 'boot-line'; line.innerText = `> ${msg}`;
                    bootText.appendChild(line);
                }, delay);
                delay += 300;
            });
            setTimeout(() => {
                bootScreen.classList.add('hidden');
                setTimeout(() => bootScreen.style.display = 'none', 800);
            }, delay + 600); 
        });

        // Гібридний лічильник
        async function initCounter() {
            const countEl = document.getElementById('stalker-count');
            countEl.innerText = "ЗВ'ЯЗОК...";
            const pdaNamespace = 's2almanac-tactical-counter'; 
            const hasVisited = localStorage.getItem('pdaVisitedFlag');

            try {
                let apiUrl = `https://api.counterapi.dev/v1/${pdaNamespace}/visits`;
                if (!hasVisited) apiUrl += '/up';
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Сервер не відповідає");
                const data = await response.json();
                
                if (!hasVisited && data.count) localStorage.setItem('pdaVisitedFlag', 'true');
                countEl.innerText = data.count.toString().padStart(5, '0');
            } catch (error) {
                let localCount = localStorage.getItem('pdaOfflineCount');
                if (!localCount) localCount = Math.floor(Math.random() * (45000 - 41000) + 41000); 
                
                if (!hasVisited) {
                    localCount = parseInt(localCount) + 1;
                    localStorage.setItem('pdaVisitedFlag', 'true');
                }
                localStorage.setItem('pdaOfflineCount', localCount);
                countEl.innerText = localCount.toString().padStart(5, '0');

                setInterval(() => {
                    if (Math.random() > 0.6) { 
                        localCount = parseInt(localStorage.getItem('pdaOfflineCount')) + 1;
                        localStorage.setItem('pdaOfflineCount', localCount);
                        countEl.innerText = localCount.toString().padStart(5, '0');
                    }
                }, 7000);
            }
        }

        let isListView = false;
        let currentPage = 1;
        const cardsPerPage = 12;
        let currentFilteredData = cardsData;

        async function toggleTranscript(id, url) {
            const el = document.getElementById(id);
            const btn = el.previousElementSibling;

            if (el.classList.contains('active')) {
                el.classList.remove('active');
                btn.innerHTML = "[+] Дешифрувати файл";
            } else {
                el.classList.add('active');
                btn.innerHTML = "[-] Сховати дані";
                
                if (!el.dataset.loaded) {
                    if (url) {
                        el.innerHTML = '<span class="loading-text">Підключення до серверів розвідки...</span>';
                        try {
                            const response = await fetch(url);
                            if (!response.ok) throw new Error("Файл не знайдено");
                            const text = await response.text();
                            el.innerHTML = text;
                            el.dataset.loaded = "true";
                        } catch (error) {
                            el.innerHTML = "[ПОМИЛКА] Файл пошкоджено радіацією або видалено.";
                        }
                    } else {
                        el.innerHTML = "[УВАГА] Текстовий фрагмент відсутній у базі даних НДІЧАЗ.";
                        el.dataset.loaded = "true";
                    }
                }
            }
        }

        function toggleView() {
            isListView = !isListView;
            const gridEl = document.getElementById('pda-grid');
            const btn = document.getElementById('view-toggle');
            
            if (isListView) {
                gridEl.classList.remove('grid'); gridEl.classList.add('list'); btn.innerHTML = "⊞ Сітка";
            } else {
                gridEl.classList.remove('list'); gridEl.classList.add('grid'); btn.innerHTML = "≡ Список";
            }
        }

        function displayPage(page) {
            currentPage = page;
            const startIndex = (currentPage - 1) * cardsPerPage;
            const endIndex = startIndex + cardsPerPage;
            const paginatedData = currentFilteredData.slice(startIndex, endIndex);
            
            renderCards(paginatedData);
            renderPaginationControls();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPaginationControls() {
            const totalPages = Math.ceil(currentFilteredData.length / cardsPerPage);
            const containerTop = document.getElementById('pagination-controls-top');
            const containerBottom = document.getElementById('pagination-controls-bottom');
            
            if (totalPages <= 1) { containerTop.innerHTML = ''; containerBottom.innerHTML = ''; return; }

            let html = '';
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="displayPage(${currentPage - 1})">◄ Попередня</button>`;
            for (let i = 1; i <= totalPages; i++) { html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="displayPage(${i})">${i}</button>`; }
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="displayPage(${currentPage + 1})">Наступна ►</button>`;
            
            containerTop.innerHTML = html; containerBottom.innerHTML = html;
        }

        function renderCards(data) {
            const grid = document.getElementById('pda-grid');
            grid.innerHTML = data.map(card => `
                <div class="card">
                    <img src="${card.img}" alt="${card.name}">
                    
                    <div class="card-content">
                        <div class="card-title">#${card.id} - ${card.name}</div>
                        
                        ${card.audio1 ? `
                        <div class="audio-label">${card.audio1Name ? card.audio1Name : 'Аудіо 1:'}</div>
                        <audio controls src="${card.audio1}"></audio>
                        <button class="transcript-btn" onclick="toggleTranscript('trans1-${card.id}', '${card.transcript1Url || ''}')">[+] Дешифрувати файл</button>
                        <div class="transcript-content" id="trans1-${card.id}"></div>` : ''}
                        
                        ${card.audio2 ? `
                        <div class="audio-label" style="margin-top: 10px;">${card.audio2Name ? card.audio2Name : 'Аудіо 2:'}</div>
                        <audio controls src="${card.audio2}"></audio>
                        <button class="transcript-btn" onclick="toggleTranscript('trans2-${card.id}', '${card.transcript2Url || ''}')">[+] Дешифрувати файл</button>
                        <div class="transcript-content" id="trans2-${card.id}"></div>` : ''}
                    </div>
                </div>
            `).join('');

            const allAudios = document.querySelectorAll('audio');
            allAudios.forEach(audio => {
                audio.addEventListener('play', function() {
                    allAudios.forEach(otherAudio => {
                        if (otherAudio !== this) { otherAudio.pause(); }
                    });
                });
            });
        }

        function searchCard() {
            let input = document.getElementById('search').value.toLowerCase();
            currentFilteredData = cardsData.filter(card => 
                card.name.toLowerCase().includes(input) || card.id.includes(input)
            );
            displayPage(1);
        }

        displayPage(1);
